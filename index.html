<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Chúc Mừng Ngày Quốc Tế Thiếu Nhi 1/6 💕</title>
<style>
  :root { --pink: #ff6fae; --pink-soft: #ffa6cf; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14060f; font-family: "Segoe UI", system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }

  /* Lớp màn hình chung */
  .screen { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 1s ease; }
  .screen.active { opacity: 1; pointer-events: auto; }

  canvas { display: block; }

  /* ---------- Màn 1: vân tay ---------- */
  #screen1 { background: radial-gradient(circle at 50% 40%, #2a0c20 0%, #14060f 70%); }
  #c1 { position: absolute; inset: 0; }
  #fp-wrap {
    position: absolute; left: 50%; bottom: 16%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 14px; user-select: none;
  }
  #fp-btn {
    position: relative; width: 96px; height: 96px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 14px rgba(255,111,174,.7));
  }
  #fp-ring { position: absolute; inset: 0; transform: rotate(-90deg); }
  #fp-ring .bg { fill: none; stroke: rgba(255,166,207,.25); stroke-width: 5; }
  #fp-ring .fg { fill: none; stroke: var(--pink); stroke-width: 5; stroke-linecap: round;
    stroke-dasharray: 289; stroke-dashoffset: 289; transition: stroke-dashoffset .08s linear; }
  #fp-icon { width: 52px; height: 52px; color: var(--pink-soft); }
  #fp-text { color: #ffd6ea; font-size: 14px; letter-spacing: .5px; opacity: .85; text-align:center; }

  /* ---------- Màn 2: chữ particle ---------- */
  #screen2 { background: radial-gradient(circle at 50% 50%, #210a19 0%, #14060f 75%); }
  #c2 { position: absolute; inset: 0; }

  /* ---------- Màn 3: quả cầu ảnh ---------- */
  #screen3 { background: radial-gradient(circle at 50% 45%, #1e0817 0%, #0d040a 80%); }
  #three { position: absolute; inset: 0; }
  #cam-preview {
    position: absolute; right: 12px; bottom: 12px; width: 150px; height: 112px;
    border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,111,174,.5);
    transform: scaleX(-1); background: #000; z-index: 5; opacity: .9;
  }
  #cam-preview video { width: 100%; height: 100%; object-fit: cover; }
  #gesture-label {
    position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    color: #ffd6ea; font-size: 14px; background: rgba(0,0,0,.35); padding: 8px 16px;
    border-radius: 20px; z-index: 5; backdrop-filter: blur(4px); text-align:center;
  }
  #hand-cursor {
    position: absolute; width: 26px; height: 26px; border: 2px solid var(--pink);
    border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 6;
    box-shadow: 0 0 12px var(--pink); display: none;
  }
  /* Overlay bật camera */
  #cam-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; background: rgba(13,4,10,.85); z-index: 10; text-align: center; padding: 24px;
  }
  #cam-overlay h2 { color: #ffd6ea; font-weight: 600; font-size: 20px; }
  #cam-overlay p { color: #e7b9d3; max-width: 360px; line-height: 1.5; font-size: 14px; }
  .btn {
    background: linear-gradient(135deg, #ff6fae, #ff9ec7); color: #fff; border: none;
    padding: 12px 26px; border-radius: 30px; font-size: 15px; cursor: pointer; font-weight: 600;
    box-shadow: 0 6px 20px rgba(255,111,174,.5);
  }
  .btn.ghost { background: transparent; border: 1px solid rgba(255,166,207,.6); box-shadow: none; }
  .hint { position:absolute; top:14px; left:50%; transform:translateX(-50%); color:#e7b9d3; font-size:13px;
    background:rgba(0,0,0,.3); padding:6px 14px; border-radius:16px; z-index:5; opacity:.85; text-align:center; max-width:92%;}
</style>
</head>
<body>
<div id="app">

  <!-- ===================== MÀN 1 ===================== -->
  <section id="screen1" class="screen active">
    <canvas id="c1"></canvas>
    <div id="fp-wrap">
      <div id="fp-btn">
        <svg id="fp-ring" viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="46" />
          <circle class="fg" cx="50" cy="50" r="46" />
        </svg>
        <svg id="fp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 11a1 1 0 0 0-1 1v3a1 1 0 0 0 2 0v-3a1 1 0 0 0-1-1z"/>
          <path d="M8.5 8.5a5 5 0 0 1 7 0"/>
          <path d="M6 11a8 8 0 0 1 12 0"/>
          <path d="M9 14.5c0 2 .5 3.5 1.5 4.5"/>
          <path d="M15 14.5c0 1.5-.3 3-1 4"/>
          <path d="M12 8a3 3 0 0 0-3 3v4"/>
        </svg>
      </div>
      <div id="fp-text">Nhấn &amp; giữ vân tay để mở 💗</div>
    </div>
  </section>

  <!-- ===================== MÀN 2 ===================== -->
  <section id="screen2" class="screen">
    <canvas id="c2"></canvas>
  </section>

  <!-- ===================== MÀN 3 ===================== -->
  <section id="screen3" class="screen">
    <div id="three"></div>
    <div class="hint">✊ Nắm tay = ghép cầu &amp; xoay • ✋ Mở tay = thả ảnh bay • 🤏 Pinch = phóng to ảnh</div>
    <div id="hand-cursor"></div>
    <div id="cam-preview"><video id="cam-video" autoplay playsinline muted></video></div>
    <div id="gesture-label">Đang chờ cử chỉ…</div>
    <div id="cam-overlay">
      <h2>✋ Bật camera để điều khiển bằng cử chỉ</h2>
      <p>Cho phép truy cập camera để dùng cử chỉ tay xoay quả cầu kỷ niệm. Bạn cũng có thể dùng chuột/cảm ứng nếu không muốn bật camera.</p>
      <button class="btn" id="enable-cam">Bật camera ✋✊</button>
      <button class="btn ghost" id="skip-cam">Bỏ qua (dùng chuột)</button>
    </div>
  </section>

</div>

<!-- Thư viện -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
/* =========================================================================
   CẤU HÌNH ẢNH  —  đổi tên file ở đây cho khớp ảnh trong folder "images/"
   (folder "images" đặt CÙNG CẤP với file HTML này)
   ========================================================================= */
const IMAGE_FOLDER = "images";
const IMAGE_FILES = [
  "anh01.jpg","anh02.jpg","anh03.jpg","anh04.jpg","anh05.jpg",
  "anh06.jpg","anh07.jpg","anh08.jpg","anh09.jpg","anh10.jpg",
  "anh11.jpg","anh12.jpg","anh13.jpg","anh14.jpg","anh15.jpg",
  "anh16.jpg","anh17.jpg","anh18.jpg","anh19.jpg","anh20.jpg"
];

/* Câu chữ ở màn 2 (particle) — sửa tùy ý */
const PHRASES = ["Chúc Mừng", "Ngày Quốc Tế Thiếu Nhi", "Em Bé 💕"];

const PINK = "#ff6fae";

/* ============================ TIỆN ÍCH ============================ */
const $ = (s) => document.querySelector(s);
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}
const dist2 = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const dist3 = (a, b) => Math.hypot(a.x - b.x, a.y - b.y, (a.z||0) - (b.z||0));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

/* =========================================================================
   MÀN 1 — Đốm sáng hồng + nút vân tay (nhấn giữ để xác thực)
   ========================================================================= */
(function screen1() {
  const canvas = $("#c1"), ctx = canvas.getContext("2d");
  let W, H, dots = [];
  function resize() {
    W = canvas.width = innerWidth; H = canvas.height = innerHeight;
    dots = [];
    const n = Math.round((W * H) / 9000); // hơi dày
    for (let i = 0; i < n; i++) {
      dots.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 1 + Math.random() * 2.6,
        vx: (Math.random() - .5) * .25, vy: -0.15 - Math.random() * 0.35,
        a: 0.25 + Math.random() * 0.6, tw: Math.random() * Math.PI * 2
      });
    }
  }
  addEventListener("resize", resize); resize();

  function draw() {
    if (!$("#screen1").classList.contains("active")) { requestAnimationFrame(draw); return; }
    ctx.clearRect(0, 0, W, H);
    for (const d of dots) {
      d.x += d.vx; d.y += d.vy; d.tw += 0.03;
      if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
      if (d.x < -10) d.x = W + 10; if (d.x > W + 10) d.x = -10;
      const a = d.a * (0.6 + 0.4 * Math.sin(d.tw));
      const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r * 4);
      g.addColorStop(0, `rgba(255,150,200,${a})`);
      g.addColorStop(1, "rgba(255,120,180,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r * 4, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();

  /* --- Nhấn & giữ để load vòng tròn xác thực --- */
  const btn = $("#fp-btn"), ring = $("#fp-ring .fg");
  const CIRC = 289, HOLD_MS = 1300;
  let holding = false, startT = 0, done = false;

  function setProgress(p) { ring.style.strokeDashoffset = CIRC * (1 - p); }
  function tick() {
    if (!holding || done) return;
    const p = clamp((performance.now() - startT) / HOLD_MS, 0, 1);
    setProgress(p);
    if (p >= 1) { done = true; authSuccess(); return; }
    requestAnimationFrame(tick);
  }
  function start(e) { e.preventDefault(); if (done) return; holding = true; startT = performance.now(); tick(); }
  function cancel() { if (done) return; holding = false; setProgress(0); }
  function authSuccess() {
    $("#fp-text").textContent = "Xác thực thành công 💖";
    btn.style.filter = "drop-shadow(0 0 26px rgba(255,111,174,1))";
    setTimeout(() => { showScreen("#screen2"); startScreen2(); }, 600);
  }
  btn.addEventListener("mousedown", start);
  btn.addEventListener("touchstart", start, { passive: false });
  ["mouseup", "mouseleave"].forEach(ev => btn.addEventListener(ev, cancel));
  btn.addEventListener("touchend", cancel);
})();

/* =========================================================================
   MÀN 2 — Chữ tạo từ particle hồng, chạy lần lượt 3 dòng rồi qua màn 3
   ========================================================================= */
let screen2Started = false;
function startScreen2() {
  if (screen2Started) return; screen2Started = true;

  const canvas = $("#c2"), ctx = canvas.getContext("2d");
  let W, H;
  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  addEventListener("resize", resize); resize();

  // Lấy điểm mẫu từ chữ
  function sampleText(text) {
    const off = document.createElement("canvas");
    off.width = W; off.height = H;
    const o = off.getContext("2d");
    let fs = Math.min(W * 0.16, 150);
    o.font = `bold ${fs}px "Segoe UI", sans-serif`;
    // co chữ cho vừa bề ngang
    while (o.measureText(text).width > W * 0.85 && fs > 20) {
      fs -= 4; o.font = `bold ${fs}px "Segoe UI", sans-serif`;
    }
    o.fillStyle = "#fff"; o.textAlign = "center"; o.textBaseline = "middle";
    o.fillText(text, W / 2, H / 2);
    const data = o.getImageData(0, 0, W, H).data;
    const pts = []; const step = Math.max(4, Math.round(fs / 22));
    for (let y = 0; y < H; y += step)
      for (let x = 0; x < W; x += step)
        if (data[(y * W + x) * 4 + 3] > 128) pts.push({ x, y });
    return pts;
  }

  // pool particle
  const MAX = 4000;
  const ps = [];
  for (let i = 0; i < MAX; i++)
    ps.push({ x: Math.random() * W, y: Math.random() * H, tx: 0, ty: 0, on: false, sz: 1.4 + Math.random() * 1.6 });

  function assign(text) {
    const pts = sampleText(text);
    // xáo trộn nhẹ
    for (let i = pts.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[pts[i], pts[j]] = [pts[j], pts[i]]; }
    for (let i = 0; i < ps.length; i++) {
      if (i < pts.length) { ps[i].tx = pts[i].x; ps[i].ty = pts[i].y; ps[i].on = true; }
      else { ps[i].tx = Math.random() * W; ps[i].ty = H + 40 + Math.random() * 80; ps[i].on = false; }
    }
  }

  let phase = "in", phaseStart = performance.now(), idx = 0, running = true;
  assign(PHRASES[0]);

  function draw() {
    if (!running) return;
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    const now = performance.now(), el = now - phaseStart;
    for (const p of ps) {
      const ease = p.on ? 0.10 : 0.06;
      p.x = lerp(p.x, p.tx + Math.sin(now / 600 + p.ty) * (p.on ? 1.2 : 0), ease);
      p.y = lerp(p.y, p.ty + Math.cos(now / 600 + p.tx) * (p.on ? 1.2 : 0), ease);
      const a = p.on ? 0.95 : 0.0;
      if (a <= 0.02) continue;
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,120,180,${a})`;
      ctx.shadowColor = PINK; ctx.shadowBlur = 8;
      ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // điều khiển pha: vào (1s) -> giữ (1.7s) -> ra (0.6s) -> dòng kế
    if (phase === "in" && el > 1000) { phase = "hold"; phaseStart = now; }
    else if (phase === "hold" && el > 1700) { phase = "out"; phaseStart = now;
      for (const p of ps) { p.tx += (Math.random() - .5) * 60; p.ty -= 80 + Math.random() * 120; p.on = false; } }
    else if (phase === "out" && el > 650) {
      idx++;
      if (idx < PHRASES.length) { assign(PHRASES[idx]); phase = "in"; phaseStart = now; }
      else { running = false; finishScreen2(); }
    }
  }
  draw();

  function finishScreen2() {
    showScreen("#screen3");
    initScreen3();
  }
}

/* =========================================================================
   MÀN 3 — Quả cầu ảnh (Three.js) + điều khiển cử chỉ tay (MediaPipe)
   ========================================================================= */
let three = {}, screen3Inited = false;

function makePlaceholderTexture(i) {
  const c = document.createElement("canvas"); c.width = c.height = 256;
  const x = c.getContext("2d");
  const g = x.createLinearGradient(0, 0, 256, 256);
  g.addColorStop(0, "#ff8ec0"); g.addColorStop(1, "#c64b8e");
  x.fillStyle = g; x.fillRect(0, 0, 256, 256);
  x.fillStyle = "rgba(255,255,255,.9)"; x.font = "bold 70px sans-serif";
  x.textAlign = "center"; x.textBaseline = "middle";
  x.fillText("💕", 128, 100); x.font = "bold 40px sans-serif";
  x.fillText("Ảnh " + (i + 1), 128, 170);
  const t = new THREE.Texture(c); t.needsUpdate = true; return t;
}

function fibSphere(n, R) {
  const pts = []; const inc = Math.PI * (3 - Math.sqrt(5)); const off = 2 / n;
  for (let i = 0; i < n; i++) {
    const y = i * off - 1 + off / 2; const r = Math.sqrt(Math.max(0, 1 - y * y)); const phi = i * inc;
    pts.push(new THREE.Vector3(Math.cos(phi) * r * R, y * R, Math.sin(phi) * r * R));
  }
  return pts;
}

function initScreen3() {
  if (screen3Inited) return; screen3Inited = true;

  const container = $("#three");
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 120);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  container.appendChild(renderer.domElement);

  const group = new THREE.Group(); scene.add(group);

  const N = IMAGE_FILES.length;
  const R = 46;
  const spherePts = fibSphere(N, R);
  const loader = new THREE.TextureLoader();
  const idQuat = new THREE.Quaternion();
  const meshes = [];

  for (let i = 0; i < N; i++) {
    const size = 12 + (i % 4) * 4 + Math.random() * 4; // mảnh nhiều kích cỡ
    const geo = new THREE.PlaneGeometry(1, 1);
    const mat = new THREE.MeshBasicMaterial({ map: makePlaceholderTexture(i), side: THREE.DoubleSide, transparent: true });
    const mesh = new THREE.Mesh(geo, mat);

    const sp = spherePts[i].clone();
    mesh.position.copy(sp);
    mesh.lookAt(sp.clone().multiplyScalar(2)); // hướng ra ngoài
    const outQuat = mesh.quaternion.clone();
    group.add(mesh);

    // vị trí khi thả nổi (random quanh không gian phía trước)
    const scatter = new THREE.Vector3(
      (Math.random() - .5) * 150, (Math.random() - .5) * 90, (Math.random() - .5) * 120
    );

    const m = {
      mesh, sp, outQuat, scatter,
      size, aspect: 1,
      baseScale: new THREE.Vector3(size, size, 1),
      zoomScale: new THREE.Vector3(size, size, 1)
    };
    meshes.push(m);

    // load ảnh thật
    loader.load(
      `${IMAGE_FOLDER}/${IMAGE_FILES[i]}`,
      (tex) => {
        mat.map = tex; mat.needsUpdate = true;
        const a = tex.image.width / tex.image.height || 1;
        m.aspect = a;
        m.baseScale.set(size * a, size, 1);
        const ZS = 70;
        m.zoomScale.set(ZS * a, ZS, 1);
      },
      undefined,
      () => { const ZS = 70; m.zoomScale.set(ZS, ZS, 1); } // lỗi -> giữ placeholder
    );
  }

  three = { scene, camera, renderer, group, meshes };

  addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  /* ---------- TRẠNG THÁI ĐIỀU KHIỂN ---------- */
  const S = {
    t: 0, targetT: 0,            // 0 = quả cầu, 1 = thả nổi
    rotY: 0, targetRotY: 0,      // xoay cầu (nắm tay di chuyển trái/phải)
    zoom: false, zoomIdx: -1,
    hand: { x: .5, y: .5, present: false },
    panX: 0, panY: 0
  };
  three.S = S;

  const tmpV = new THREE.Vector3(), tmpQ = new THREE.Quaternion();
  const frontPos = new THREE.Vector3();

  function projectToScreen(v) {
    const p = v.clone().project(camera);
    return { x: (p.x * .5 + .5), y: (1 - (p.y * .5 + .5)) };
  }
  function pickNearest(hx, hy) {
    let best = -1, bd = 1e9;
    for (let i = 0; i < meshes.length; i++) {
      const s = projectToScreen(meshes[i].mesh.position);
      const d = Math.hypot(s.x - hx, s.y - hy);
      if (d < bd) { bd = d; best = i; }
    }
    return best;
  }
  three.pickNearest = pickNearest;

  function animate() {
    requestAnimationFrame(animate);
    if (!$("#screen3").classList.contains("active")) { renderer.render(scene, camera); return; }

    S.t += (S.targetT - S.t) * 0.06;
    S.rotY += (S.targetRotY - S.rotY) * 0.05;
    group.rotation.y = S.rotY * (1 - S.t); // chỉ xoay khi đang là quả cầu

    // pan camera nhẹ khi đang thả nổi (đưa tay vòng vòng để xem)
    const wantPanX = S.t > 0.5 ? (S.hand.x - .5) * 70 : 0;
    const wantPanY = S.t > 0.5 ? -(S.hand.y - .5) * 45 : 0;
    S.panX = lerp(S.panX, wantPanX, 0.05);
    S.panY = lerp(S.panY, wantPanY, 0.05);
    camera.position.x = S.panX; camera.position.y = S.panY;
    camera.lookAt(0, 0, 0);

    // vị trí trước mặt camera (cho ảnh zoom)
    frontPos.set(camera.position.x, camera.position.y, camera.position.z - 55);

    for (let i = 0; i < meshes.length; i++) {
      const m = meshes[i];
      const zoomed = S.zoom && i === S.zoomIdx;
      if (zoomed) {
        m.mesh.position.lerp(frontPos, 0.16);
        m.mesh.quaternion.slerp(camera.quaternion, 0.16);
        m.mesh.scale.lerp(m.zoomScale, 0.16);
        m.mesh.material.opacity = 1; m.mesh.renderOrder = 20;
      } else {
        tmpV.copy(m.sp).lerp(m.scatter, S.t);
        m.mesh.position.lerp(tmpV, 0.10);
        tmpQ.copy(m.outQuat).slerp(idQuat, S.t); // cầu: hướng ra ngoài | thả: nhìn thẳng
        m.mesh.quaternion.slerp(tmpQ, 0.10);
        m.mesh.scale.lerp(m.baseScale, 0.10);
        m.mesh.material.opacity = S.zoom ? 0.12 : 1; m.mesh.renderOrder = 0;
      }
    }
    renderer.render(scene, camera);
  }
  animate();

  // nút overlay
  $("#enable-cam").onclick = () => { $("#cam-overlay").style.display = "none"; startCamera(); };
  $("#skip-cam").onclick = () => { $("#cam-overlay").style.display = "none"; enableMouseFallback(); };
}

/* ---------- ĐIỀU KHIỂN CỬ CHỈ (MediaPipe Hands) ---------- */
let gestureBuf = [], stableGesture = "none";

function classifyGesture(lm) {
  const w = lm[0];
  const fingerExt = (tip, pip) => dist3(lm[tip], w) > dist3(lm[pip], w) * 1.05;
  const ext = [[8, 6], [12, 10], [16, 14], [20, 18]].map(([t, p]) => fingerExt(t, p));
  const count = ext.filter(Boolean).length;
  const pinchD = dist3(lm[4], lm[8]);
  if (pinchD < 0.06) return "pinch";
  if (count >= 4) return "open";
  if (count <= 1) return "fist";
  return "other";
}

function onHandResults(res) {
  const label = $("#gesture-label"), cursor = $("#hand-cursor");
  const S = three.S;
  if (!res.multiHandLandmarks || !res.multiHandLandmarks.length) {
    S.hand.present = false; cursor.style.display = "none";
    label.textContent = "Không thấy tay — đưa bàn tay vào khung camera ✋";
    return;
  }
  const lm = res.multiHandLandmarks[0];
  S.hand.present = true;
  S.hand.x = 1 - lm[9].x;   // mirror cho trực giác
  S.hand.y = lm[9].y;

  // con trỏ tay
  cursor.style.display = "block";
  cursor.style.left = (S.hand.x * innerWidth) + "px";
  cursor.style.top = (S.hand.y * innerHeight) + "px";

  const g = classifyGesture(lm);
  gestureBuf.push(g); if (gestureBuf.length > 5) gestureBuf.shift();
  // chọn cử chỉ ổn định (xuất hiện nhiều nhất)
  const cnt = {}; gestureBuf.forEach(x => cnt[x] = (cnt[x] || 0) + 1);
  stableGesture = Object.keys(cnt).sort((a, b) => cnt[b] - cnt[a])[0];

  applyGesture(stableGesture, S, label);
}

function applyGesture(g, S, label) {
  if (g === "fist") {
    S.targetT = 0; S.zoom = false; S.zoomIdx = -1;
    // tay trái/phải -> xoay cầu (max 1 bên = nửa cầu = PI)
    S.targetRotY = (S.hand.x - 0.5) * 2 * Math.PI; // [-PI, PI]
    label.textContent = "✊ Quả cầu — di tay trái/phải để xoay";
  } else if (g === "open") {
    S.targetT = 1; S.zoom = false; S.zoomIdx = -1;
    label.textContent = "✋ Ảnh đang thả nổi — đưa tay vòng vòng để xem";
  } else if (g === "pinch") {
    if (S.t > 0.4) { // chỉ zoom khi đang ở chế độ thả nổi
      if (!S.zoom) { S.zoom = true; S.zoomIdx = three.pickNearest(S.hand.x, S.hand.y); }
      label.textContent = "🤏 Phóng to ảnh — mở tay để thu lại";
    }
  } else {
    label.textContent = "✋ Mở tay / ✊ nắm tay / 🤏 pinch";
  }
}

let cameraStarted = false;
function startCamera() {
  if (cameraStarted) return; cameraStarted = true;
  const video = $("#cam-video");
  try {
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    hands.onResults(onHandResults);
    const cam = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640, height: 480
    });
    cam.start();
  } catch (e) {
    console.error(e);
    $("#gesture-label").textContent = "Không bật được camera — chuyển sang điều khiển chuột.";
    enableMouseFallback();
  }
}

/* ---------- DỰ PHÒNG: ĐIỀU KHIỂN BẰNG CHUỘT / CẢM ỨNG ---------- */
function enableMouseFallback() {
  $("#cam-preview").style.display = "none";
  const S = three.S, el = three.renderer.domElement;
  $("#gesture-label").textContent = "Chuột: kéo để xoay • phím Space: thả/ghép • nhấp đúp ảnh: phóng to";
  let dragging = false, lastX = 0;
  el.addEventListener("pointerdown", (e) => { dragging = true; lastX = e.clientX; });
  addEventListener("pointerup", () => dragging = false);
  addEventListener("pointermove", (e) => {
    S.hand.x = e.clientX / innerWidth; S.hand.y = e.clientY / innerHeight;
    if (dragging && S.targetT < 0.5) { S.targetRotY += (e.clientX - lastX) * 0.01; lastX = e.clientX; }
  });
  addEventListener("keydown", (e) => {
    if (e.code === "Space") { S.targetT = S.targetT < 0.5 ? 1 : 0; S.zoom = false; }
  });
  el.addEventListener("dblclick", (e) => {
    if (S.targetT > 0.5) { S.zoom = !S.zoom; S.zoomIdx = three.pickNearest(e.clientX / innerWidth, e.clientY / innerHeight); }
  });
}
</script>
